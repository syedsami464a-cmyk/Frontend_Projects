<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="weather.css">
    <title>Document</title>
    <style>
        
    </style>
</head>
<body>
    <div class="header">
        <div class="card">
            <div class="card-top">
                <input type="text" placeholder="Enter City Name" id="input-tag" name="input" spellcheck="false">
                <div class="search">
                    <img src="search.png" alt="search option" class="search-img-button">
                </div>
                <img  onclick="changebg()"  src="moon-regular-full.svg" alt="moon_image" height="30px" id="icon"> 
            </div>
            <div class="weather">
                <div class="card-mid">
                    <div class="image">
                        <img src="weather.png" alt="weather image" class="weather_image">
                    </div>
                    <div class="content">
                        <h1 class="content_header">22°C</h1>
                        <p class="content_para">NewYork</p>
                    </div>
                </div>

                <div class="card-btm">
                    <div class="card-btm-left">
                        <div class="image-btm">
                            <img src="humidity.png" alt="humidity logo" class="humidity_image">
                        </div>
                        <div class="Humidity-info">
                            <h1 class="humidity">50%</h1>
                            <h3>Humidity</h3>
                        </div>
                    </div>
                    <div class="card-btm-right">
                        <div class="image-btm">
                            <img src="windspeed.png" alt="winspeeed logo" class="wind_image">

                        </div>
                        <div class="Wing-info">
                            <h1 class="wind">15 km/h</h1>
                            <h3>Wind Speed</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="weather.js"></script>

</body>
</html>
