<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: white;
            color: black;
        }
        /* body.dark-theme{  -> both cases can be works here */ 
        .dark-theme{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <h1>This is the example for Light and Dark mode</h1>
    <p>Switch the button to make into light and dark mode</p>
    <button onclick="ToggleMode()">Swith Mode</button>

    <script>
        function ToggleMode(){
            document.body.classList.toggle("dark-theme");
        }
    </script>

    

</body>
</html>
