<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://kit.fontawesome.com/8cb011bcad.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="hero">
        <p>Website is Under Maintenance</p>
        <h1>We're <span>Launching</span> Soon</h1>
        <div class="info-main">
            <div id="days" class="info">
                <h1>25</h1>
                <p>Days</p>
            </div>
            <div id="hours" class="info">
                <h1>10</h1>
                <p>Hours</p>
            </div>
            <div id="minutes" class="info">
                <h1>44</h1>
                <p>Minutes</p>
            </div>
            <div id="seconds" class="info">
                <h1>20</h1>
                <p>Seconds</p>
            </div>
        </div>
        <button><i class="fa-solid fa-play"></i> Learn More</button>

        <img src="rocket.jpg" class="rocket">
    </div>
</body>
</html>
