<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
</head>
<link rel="stylesheet" href="qr.css">
<body>
    
    <div class="container">
        <div class="card">
