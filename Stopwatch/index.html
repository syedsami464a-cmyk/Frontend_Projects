<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/8cb011bcad.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap');        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background:#edeaff;
            font-family: "Merriweather", serif;
        }
        .stopwatch{
            width: 90%;
            max-width: 600px;
            background-image: linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.8)),url(background.png);
            background-size: cover;
            background-position: center;
            text-align: center;
            padding: 40px 0;
            color: #fff;
            margin: 200px auto 0; /*top,left-right(auto),bottom*/
            box-shadow: 0 10px 10px rgba(0,0,0,0.3);
        }
        .stopwatch h1{
            margin-top: 60px;
            font-size: 64px;
            font-weight: 300;
        }
        .buttons{
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
            gap: 1rem;
        }
        .buttons i{
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            
            margin: 0 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="stopwatch">
        <h1 id="displayTime">00:00:00</h1>
        <div class="buttons">
            <button onclick="watchStart()"><i class="fa-solid fa-play"></i></button>
            <button onclick="watchStop()"><i class="fa-solid fa-pause"></i></button>
            <button onclick="watchReset()"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
