<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/8cb011bcad.js" crossorigin="anonymous"></script>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins',sans-serif;
        }
        body{
            background: #ffffff;
        }
        .gallery{
            width:900px;
            display: flex;
            overflow-x: scroll;
            scroll-behavior: smooth;
        }

        .gallery div{
            width: 100%;
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 20px;
            padding: 10px;
            flex: none; /*though this we can get the horizontal scroll bar */
        }

        .gallery div img{
            width: 100%;
            height: 80%;
            transition: transform 0.5s;
        }

        .gallery::-webkit-scrollbar{
            display: none;
        }
        
        .gallery-wrap{
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10% auto; /*height ->10% and width-> auto */
        }

        #backbtn,#nextbtn{
            width: 50px;
            cursor: pointer;
            margin-bottom:20px;
        }
        
        .gallery div img:hover{
            filter:grayscale(0);
            cursor: pointer;
            transform: scale(1.1);
        }

    </style>
</head>
<body>
    <div class="gallery-wrap">

        <img src="forward.png" alt="Forward_Image" id="backbtn">

        <div class="gallery">
            <div>
                <span><img src="image1.png" alt="image1"></span>
                <span><img src="image2.png" alt="image1"></span>
                <span><img src="image3.png" alt="image1"></span>
            </div>

            <div>
                <span><img src="image4.png" alt="image1"></span>
                <span><img src="image5.png" alt="image1"></span>
                <span><img src="image6.png" alt="image1"></span>
            </div>
        </div>

      <img src="backward.png" alt="Backward_image" id="nextbtn">

    </div>


    <script src="project.js"></script>

</body>
</html>
