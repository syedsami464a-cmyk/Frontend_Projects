<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/8cb011bcad.js" crossorigin="anonymous"></script>    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .Main_content{
            background-color: rgb(255, 255, 255);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: start;
            align-items: start;
        }
        .container{
            margin: 10rem;
            display: flex;
            gap: 1rem;
        }
        button{
            padding: 0.5rem 1rem;
            background-color: violet;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold; 
        }
        #toastBox{
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            bottom: 30px;
            right: 30px;
            overflow: hidden;
        }
        .toast{
            width: 300px;
            height: 50px;
            padding: 1rem;
            background-color: white;
            font-weight: 500;
            background: #fff;
            margin: 15px 0;
            box-shadow: 0  0 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            text-align: start;
            position: relative; /*bcoz we are using absolute in after side..*/
            transform: translateX(100%);
            animation: moveleft 0.5s linear forwards;
        }

        @keyframes moveleft {
            100%{
                transform: translateX(0);
            }
            
        }
        .toast i{
            margin: 0 20px;
            font-size: 35px;
            color: green;
        }

        .toast.error i{
            color: red;
        }

        .toast.invalid i{
            color: orange;
        }

        .toast::after{
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 5px;
            background: green;
            animation: anim 2s linear forwards;
        }
        @keyframes anim{
            100%{
                width: 0;
            }
        }
        .toast.error::after{
            background: red;
        }
        .toast.invalid::after{
            background: orange;
        }

    </style>
</head>
<body>
    <div class="Main_content">
        <div class="container">
            <button onclick="showToast(successMsg)">Success</button>
            <button onclick="showToast(errorMsg)">Error</button>
            <button onclick="showToast(invalidMsg)">Invalid</button>
        </div>
    </div>

    <div id="toastBox"></div>

    <script>
        let toastBox = document.getElementById("toastBox");
        let successMsg = '<i class="fa-solid fa-check"></i> Successfully Submitted';
        let errorMsg = '<i class="fa-solid fa-xmark"></i> Please fix the error!';
        let invalidMsg = '<i class="fa-solid fa-exclamation"></i> Invalid input , check again';

        function showToast(msg){
            let toast = document.createElement("div");
            toast.classList.add("toast");
            toast.innerHTML = msg;
            toastBox.appendChild(toast);

            if(msg.includes('error')){
                toast.classList.add("error");
            }

             if(msg.includes('Invalid')){
                toast.classList.add("invalid");
            }
 
        
        setTimeout(() => {
            toast.remove();
        }, 3000);

        }
    </script>

</body>
</html>
